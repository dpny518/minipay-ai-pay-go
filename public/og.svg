<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Yellow glow top-left -->
  <radialGradient id="glow" cx="20%" cy="30%" r="50%">
    <stop offset="0%" stop-color="#FCFF52" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#FCFF52" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="#FCFF52"/>
  <!-- Zap icon inside logo -->
  <polygon points="108,92 96,116 106,116 100,148 120,120 108,120 116,92" fill="#0a0a0a"/>

  <!-- Brand name -->
  <text x="152" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">MiniPay AI</text>
  <text x="152" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#52525b">Pay-Per-Use AI Tools on Celo</text>

  <!-- Divider -->
  <line x1="80" y1="180" x2="1120" y2="180" stroke="#27272a" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff">AI Tools.</text>
  <text x="80" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#FCFF52">Pay-Per-Use.</text>

  <!-- Subtext -->
  <text x="80" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#71717a">Access web search, scraping, AI answers &amp; data enrichment</text>
  <text x="80" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#71717a">for micro-cents in cUSD. No subscriptions.</text>

  <!-- Feature pills -->
  <rect x="80" y="510" width="130" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="145" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">Web Search</text>

  <rect x="224" y="510" width="100" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="274" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">Scrape</text>

  <rect x="338" y="510" width="90" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="383" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">AI Q&amp;A</text>

  <rect x="442" y="510" width="100" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="492" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">Enrich</text>

  <rect x="556" y="510" width="130" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="621" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">Email Verify</text>

  <!-- Right side: cUSD badge -->
  <rect x="820" y="240" width="300" height="160" rx="20" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="970" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#52525b" text-anchor="middle">Starting from</text>
  <text x="970" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#35D07F" text-anchor="middle">$0.025</text>
  <text x="970" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#52525b" text-anchor="middle">per task in cUSD</text>

  <!-- Powered by -->
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#3f3f46" text-anchor="end">Powered by Celo · AgentCash · MiniPay</text>
</svg>
